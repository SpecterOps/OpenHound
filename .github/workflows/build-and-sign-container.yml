name: Build, Sign, and Publish Container Image

on:
  release:
    types: [ published ]

permissions:
  contents: read
  id-token: write

jobs:
  build-scheduler-image-tar:
    environment: publish
    name: Build Scheduler Image Tar
    runs-on: ubuntu-latest
    outputs:
      clean_version: ${{ steps.image-ref.outputs.clean_version }}
      docker_image_tar: ${{ steps.image-ref.outputs.docker_image_tar }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: refs/tags/${{ github.event.release.tag_name }}
          fetch-depth: 0

      - name: Set image reference and tar name
        id: image-ref
        run: |
          CLEAN_VERSION="${{ github.event.release.tag_name }}"

          if [ -z "$CLEAN_VERSION" ]; then
            echo "Error: version is empty"
            exit 1
          fi

          CLEAN_VERSION="${CLEAN_VERSION#v}"
          IMAGE_REF="openhound:${CLEAN_VERSION}-scheduler"
          IMAGE_TAR="openhound-${CLEAN_VERSION}-scheduler.tar"

          echo "clean_version=$CLEAN_VERSION" >> "$GITHUB_OUTPUT"
          echo "docker_image_reference=$IMAGE_REF" >> "$GITHUB_OUTPUT"
          echo "docker_image_tar=$IMAGE_TAR" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build scheduler image tar
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          target: scheduler
          platforms: linux/amd64
          push: false
          tags: ${{ steps.image-ref.outputs.docker_image_reference }}
          build-args: |
            OPENHOUND_VERSION=${{ steps.image-ref.outputs.clean_version }}
          outputs: type=docker,dest=${{ steps.image-ref.outputs.docker_image_tar }}

      - name: Upload scheduler image tar artifact
        uses: actions/upload-artifact@v4
        with:
          name: image-tar-scheduler
          path: ${{ steps.image-ref.outputs.docker_image_tar }}
          if-no-files-found: error
          retention-days: 7

  sign-and-upload-s3:
    name: Sign Scheduler Image and Upload to S3
    runs-on: ubuntu-latest
    needs: build-scheduler-image-tar

    env:
      SM_API_KEY: ${{ secrets.SM_API_KEY }}
      SM_CLIENT_CERT_PASSWORD: ${{ secrets.SM_CLIENT_CERT_PASSWORD }}
      SM_CLIENT_CERT_FILE_B64: ${{ secrets.SM_CLIENT_CERT_FILE_B64 }}
      SM_HOST: ${{ secrets.SM_HOST }}
      SM_KEYPAIR_ALIAS: ${{ secrets.SM_KEYPAIR_ALIAS }}
      AWS_REGION: us-east-1
      S3_BUCKET: ${{ secrets.BHE_S3_BUCKET }}

    steps:
      - name: Download scheduler image tar artifact
        uses: actions/download-artifact@v4
        with:
          name: image-tar-scheduler

      - name: Install pkcs11-tool
        run: |
          sudo apt-get update
          sudo apt-get install -y opensc libengine-pkcs11-openssl

      - name: Create client certificate file
        run: |
          CERT_PATH="$RUNNER_TEMP/sm-client-cert.p12"
          echo "$SM_CLIENT_CERT_FILE_B64" | base64 --decode > "$CERT_PATH"
          echo "SM_CLIENT_CERT_FILE=$CERT_PATH" >> "$GITHUB_ENV"

      - name: Setup Software Trust Manager
        id: stm-setup
        uses: digicert/code-signing-software-trust-action@v1.1.0
        env:
          SM_HOST: ${{ env.SM_HOST }}
          SM_API_KEY: ${{ env.SM_API_KEY }}
          SM_CLIENT_CERT_FILE: ${{ env.SM_CLIENT_CERT_FILE }}
          SM_CLIENT_CERT_PASSWORD: ${{ env.SM_CLIENT_CERT_PASSWORD }}

      - name: Resolve PKCS#11 module and config
        run: |
          CONFIG_PATH="${{ steps.stm-setup.outputs.PKCS11_CONFIG }}"

          if [ -z "$CONFIG_PATH" ]; then
            echo "PKCS11_CONFIG output is empty"
            exit 1
          fi

          CONFIG_DIR="$(dirname "$CONFIG_PATH")"

          echo "PKCS11 config file location: $CONFIG_PATH"
          echo "Directory: $CONFIG_DIR"
          ls -la "$CONFIG_DIR"

          MODULE_PATH="$(find "$CONFIG_DIR" -maxdepth 1 -type f -name 'smpkcs11.so')"

          if [ -z "$MODULE_PATH" ]; then
            echo "Could not find PKCS#11 module in $CONFIG_DIR"
            exit 1
          fi

          echo "Found PKCS#11 module: $MODULE_PATH"

          echo "config_path=$CONFIG_PATH" >> "$GITHUB_OUTPUT"
          echo "config_dir=$CONFIG_DIR" >> "$GITHUB_OUTPUT"
          echo "module_path=$MODULE_PATH" >> "$GITHUB_OUTPUT"

          echo "PKCS11_CONFIG=$CONFIG_PATH" >> "$GITHUB_ENV"
          echo "COSIGN_PKCS11_MODULE_PATH=$MODULE_PATH" >> "$GITHUB_ENV"

      - name: Create OpenSSL PKCS#11 config
        run: |
          ENGINE_PATH="$(find /usr/lib /lib \( -path '*engines-3/pkcs11.so' -o -path '*engines-1.1/pkcs11.so' \) 2>/dev/null | head -n 1)"

          if [ -z "$ENGINE_PATH" ]; then
            echo "Could not find OpenSSL pkcs11 engine"
            exit 1
          fi

          if [ -z "$COSIGN_PKCS11_MODULE_PATH" ]; then
            echo "COSIGN_PKCS11_MODULE_PATH is empty"
            exit 1
          fi

          if [ -z "$PKCS11_CONFIG" ]; then
            echo "PKCS11_CONFIG is empty"
            exit 1
          fi

          echo "Using OpenSSL engine: $ENGINE_PATH"
          echo "Using STM module: $COSIGN_PKCS11_MODULE_PATH"
          echo "Using STM PKCS11 config: $PKCS11_CONFIG"

          cat > "$RUNNER_TEMP/openssl-pkcs11.cnf" <<EOF
          openssl_conf = openssl_init

          [openssl_init]
          engines = engine_section

          [engine_section]
          pkcs11 = pkcs11_section

          [pkcs11_section]
          engine_id = pkcs11
          dynamic_path = $ENGINE_PATH
          MODULE_PATH = $COSIGN_PKCS11_MODULE_PATH
          init = 0
          EOF

          echo "OPENSSL_CONF=$RUNNER_TEMP/openssl-pkcs11.cnf" >> "$GITHUB_ENV"

      - name: Sign blob with OpenSSL using DigiCert key
        run: |
          IMAGE_TAR="${{ needs.build-scheduler-image-tar.outputs.docker_image_tar }}"
          openssl dgst -sha256 \
            -engine pkcs11 \
            -keyform engine \
            -sign "pkcs11:object=${{ secrets.SM_KEYPAIR_ALIAS }};type=private" \
            -out "${IMAGE_TAR}.sig" \
            "${IMAGE_TAR}"

      - name: Extract public key from PKCS#11 slot
        run: |
          IMAGE_TAR="${{ needs.build-scheduler-image-tar.outputs.docker_image_tar }}"
          pkcs11-tool \
            --module "$COSIGN_PKCS11_MODULE_PATH" \
            --read-object --type cert \
            --label "${{ secrets.SM_KEYPAIR_ALIAS }}" \
            --output-file signing-cert.der

          openssl x509 -inform DER -in signing-cert.der -out signing-cert.pem
          openssl x509 -in signing-cert.pem -pubkey -noout > "${IMAGE_TAR}-pubkey.pem"

      - name: Verify image signature
        run: |
          IMAGE_TAR="${{ needs.build-scheduler-image-tar.outputs.docker_image_tar }}"
          openssl dgst -sha256 \
            -verify "${IMAGE_TAR}-pubkey.pem" \
            -signature "${IMAGE_TAR}.sig" \
            "${IMAGE_TAR}"

      - name: Zip image tar
        run: |
          IMAGE_TAR="${{ needs.build-scheduler-image-tar.outputs.docker_image_tar }}"
          zip "${IMAGE_TAR}.zip" "${IMAGE_TAR}" "${IMAGE_TAR}.sig" "${IMAGE_TAR}-pubkey.pem"

      - name: Calculate SHA256 checksum
        run: |
          IMAGE_TAR="${{ needs.build-scheduler-image-tar.outputs.docker_image_tar }}"
          sha256sum "${IMAGE_TAR}.zip" > "${IMAGE_TAR}.zip.sha256"

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.BHE_AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.BHE_AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Upload signed artifacts to S3
        run: |
          IMAGE_TAR="${{ needs.build-scheduler-image-tar.outputs.docker_image_tar }}"
          VERSION="${{ needs.build-scheduler-image-tar.outputs.clean_version }}"

          if [ -z "$S3_BUCKET" ]; then
            echo "S3_BUCKET secret is required"
            exit 1
          fi

          DEST="s3://$S3_BUCKET/"
          aws s3 cp "${IMAGE_TAR}.zip" "${DEST}openhound_v${VERSION}_docker_linux.zip"
          aws s3 cp "${IMAGE_TAR}.zip.sha256" "${DEST}openhound_v${VERSION}_docker_linux.zip.sha256"

  push-to-docker-registry:
    name: Push Image to Docker Registry (${{ matrix.target }})
    runs-on: ubuntu-latest
    environment: publish
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: cli
            suffix: ""
            publish_latest: true
          - target: scheduler
            suffix: "-scheduler"
            publish_latest: false
    env:
      DOCKER_REGISTRY: ${{ vars.DOCKER_REGISTRY }}
      DOCKER_REPOSITORY: ${{ vars.DOCKER_REPOSITORY }}
      DOCKER_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
      DOCKER_PASSWORD: ${{ secrets.DOCKERHUB_TOKEN }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: refs/tags/${{ github.event.release.tag_name }}
          fetch-depth: 0

      - name: Set image reference
        id: image-ref
        run: |
          CLEAN_VERSION="${{ github.event.release.tag_name }}"

          if [ -z "$CLEAN_VERSION" ]; then
            echo "Error: version is empty"
            exit 1
          fi

          CLEAN_VERSION="${CLEAN_VERSION#v}"
          VERSION_TAG="$DOCKER_REGISTRY/$DOCKER_REPOSITORY:${CLEAN_VERSION}${{ matrix.suffix }}"

          echo "clean_version=$CLEAN_VERSION" >> "$GITHUB_OUTPUT"
          echo "version_tag=$VERSION_TAG" >> "$GITHUB_OUTPUT"

      - name: Set image tags
        id: image-tags
        run: |
          TAGS="${{ steps.image-ref.outputs.version_tag }}"

          if [ "${{ matrix.publish_latest }}" = "true" ]; then
            TAGS="${TAGS}"$'\n'"${DOCKER_REGISTRY}/${DOCKER_REPOSITORY}:latest"
          fi

          {
            echo "tags<<EOF"
            echo "$TAGS"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to Docker registry
        run: |
          echo "$DOCKER_PASSWORD" | docker login "$DOCKER_REGISTRY" -u "$DOCKER_USERNAME" --password-stdin

      - name: Build and push multi-arch image
        id: push
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile
          target: ${{ matrix.target }}
          platforms: linux/amd64,linux/arm64
          push: true
          sbom: true
          tags: ${{ steps.image-tags.outputs.tags }}
          build-args: |
            OPENHOUND_VERSION=${{ steps.image-ref.outputs.clean_version }}

      - name: Persist digest
        run: |
          echo "${{ steps.push.outputs.digest }}" > "${{ runner.temp }}/digest-${{ matrix.target }}.txt"

      - name: Upload digest artifact
        uses: actions/upload-artifact@v4
        with:
          name: docker-digest-${{ matrix.target }}
          path: ${{ runner.temp }}/digest-${{ matrix.target }}.txt
          if-no-files-found: error
          retention-days: 7

  sign-docker-image:
    name: Sign Published Image (${{ matrix.target }})
    runs-on: ubuntu-latest
    needs: push-to-docker-registry
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: cli
          - target: scheduler
    permissions:
      contents: read
      id-token: write
    env:
      COSIGN_YES: "true"
      DOCKER_REGISTRY: ${{ vars.DOCKER_REGISTRY }}
      DOCKER_REPOSITORY: ${{ vars.DOCKER_REPOSITORY }}
      DOCKER_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
      DOCKER_PASSWORD: ${{ secrets.DOCKERHUB_TOKEN }}

    steps:
      - name: Install Cosign
        uses: sigstore/cosign-installer@v4.1.1

      - name: Download digest artifact
        uses: actions/download-artifact@v4
        with:
          name: docker-digest-${{ matrix.target }}
          path: ${{ runner.temp }}

      - name: Read digest
        id: digest
        run: |
          DIGEST="$(cat "${{ runner.temp }}/digest-${{ matrix.target }}.txt")"
          DIGEST_REF="${DOCKER_REGISTRY}/${DOCKER_REPOSITORY}@${DIGEST}"
          echo "digest_ref=$DIGEST_REF" >> "$GITHUB_OUTPUT"

      - name: Login to Docker registry
        run: |
          echo "$DOCKER_PASSWORD" | docker login "$DOCKER_REGISTRY" -u "$DOCKER_USERNAME" --password-stdin

      - name: Sign image with Cosign keyless
        run: |
          cosign sign --yes "${{ steps.digest.outputs.digest_ref }}"

  verify-docker-image-trust:
    name: Verify Published Image Signature (${{ matrix.target }})
    runs-on: ubuntu-latest
    needs:
      - push-to-docker-registry
      - sign-docker-image
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: cli
          - target: scheduler
    env:
      DOCKER_REGISTRY: ${{ vars.DOCKER_REGISTRY }}
      DOCKER_REPOSITORY: ${{ vars.DOCKER_REPOSITORY }}
      DOCKER_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
      DOCKER_PASSWORD: ${{ secrets.DOCKERHUB_TOKEN }}

    steps:
      - name: Install Cosign
        uses: sigstore/cosign-installer@v4.1.1

      - name: Download digest artifact
        uses: actions/download-artifact@v4
        with:
          name: docker-digest-${{ matrix.target }}
          path: ${{ runner.temp }}

      - name: Read digest
        id: digest
        run: |
          DIGEST="$(cat "${{ runner.temp }}/digest-${{ matrix.target }}.txt")"
          DIGEST_REF="${DOCKER_REGISTRY}/${DOCKER_REPOSITORY}@${DIGEST}"
          echo "digest_ref=$DIGEST_REF" >> "$GITHUB_OUTPUT"

      - name: Login to Docker registry
        run: |
          echo "$DOCKER_PASSWORD" | docker login "$DOCKER_REGISTRY" -u "$DOCKER_USERNAME" --password-stdin

      - name: Verify Fulcio keyless signature
        run: |
          cosign verify "${{ steps.digest.outputs.digest_ref }}" \
            --certificate-oidc-issuer "https://token.actions.githubusercontent.com" \
            --certificate-identity-regexp "https://github.com/${{ github.repository }}/.github/workflows/.*"
