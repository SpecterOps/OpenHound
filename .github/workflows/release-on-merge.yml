name: Create Dev Release Tag and publish new version

on:
  pull_request:
    branches:
      - main
    types:
      - closed
    paths:
      - "src/**"
      - "pyproject.toml"
      - "uv.lock"
      - "README.md"

permissions:
  contents: write
  id-token: write   # This is required for requesting the JWT for the OIDC provider

jobs:

  test-core:
    if: github.event.pull_request.merged == true
    uses: ./.github/workflows/test.yml
    secrets: inherit

  tag-release:
    needs: test-core
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    outputs:
      new_version: ${{ steps.versioning.outputs.new_version }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Fetch tags
        run: git fetch --tags

      - name: Determine next dev version
        id: versioning
        run: |
          # Get latest stable tag (vMAJOR.MINOR.PATCH only, excluding dev/pre-release tags)
          LATEST_STABLE=$(git tag --sort=-v:refname \
            | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' \
            | head -n 1 || true)
          if [ -z "$LATEST_STABLE" ]; then
            LATEST_STABLE="v0.0.0"
          fi
          echo "Latest stable tag: $LATEST_STABLE"

          # Dev releases target the next version on top of the last stable.
          # Branch prefix selects the bump level; unknown prefixes default to patch.
          VERSION=${LATEST_STABLE#v}
          IFS='.' read -r MAJOR MINOR PATCH <<< "$VERSION"

          BRANCH_NAME="${{ github.event.pull_request.head.ref }}"
          echo "Merged branch: $BRANCH_NAME"

          if [[ "$BRANCH_NAME" == major/* ]]; then
            MAJOR=$((MAJOR + 1))
            MINOR=0
            PATCH=0
          elif [[ "$BRANCH_NAME" == feature/* || "$BRANCH_NAME" == minor/* ]]; then
            MINOR=$((MINOR + 1))
            PATCH=0
          else
            # fix/*, patch/*, or any other branch name
            PATCH=$((PATCH + 1))
          fi

          NEXT_BASE="v${MAJOR}.${MINOR}.${PATCH}"
          echo "Next dev base: $NEXT_BASE"

          # Find the next dev number for this base
          LAST_DEV=$(git tag --list "${NEXT_BASE}.dev*" \
            | sed "s|^${NEXT_BASE}\.dev||" \
            | sort -n | tail -n 1)
          if [ -z "$LAST_DEV" ]; then
            DEV_NUM=1
          else
            DEV_NUM=$((LAST_DEV + 1))
          fi

          NEW_VERSION="${NEXT_BASE}.dev${DEV_NUM}"

          echo "NEW_VERSION=$NEW_VERSION" >> $GITHUB_ENV
          echo "new_version=$NEW_VERSION" >> $GITHUB_OUTPUT
          echo "Next dev version: $NEW_VERSION"

      - name: Create and push tag
        if: env.NEW_VERSION != ''
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git tag $NEW_VERSION
          git push origin $NEW_VERSION

  publish:
    needs: tag-release
    if: github.event.pull_request.merged == true
    uses: ./.github/workflows/build-and-publish.yml
    with:
      tag: ${{ needs.tag-release.outputs.new_version }}
    secrets: inherit
